<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferretería Central — Tu tienda de herramientas y materiales</title>
    <meta name="description"
        content="Ferretería Central: materiales, herramientas y equipos de construcción. Compra en línea y recoge en tienda o recibe a domicilio.">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/header.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <div id="app-header" data-base-path="./"></div>

    <!-- MAIN CONTENT -->
    <main class="store-main">

        <!-- Products Count -->
        <div class="products-header">
            <p class="products-count">Mostrando <strong>12</strong> productos</p>
        </div>

        <!-- Product Grid -->
        <div class="product-grid" id="productGrid">
            <!-- Productos cargados dinámicamente por app.js -->
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="store-footer">
        <div class="footer-top">
            <a href="#" class="footer-back-top">Volver arriba</a>
        </div>
        <div class="footer-main">
            <div class="footer-col">
                <h4>Conócenos</h4>
                <a href="views/nosotros.html">Sobre nosotros</a>
                <a href="#">Trabaja con nosotros</a>
                <a href="#">Sucursales</a>
            </div>
            <div class="footer-col">
                <h4>Contacto</h4>
                <a href="#">contacto@ferreteriacentral.com</a>
                <a href="#">809-555-0100</a>
                <a href="#">WhatsApp</a>
            </div>
            <div class="footer-col">
                <h4>Síguenos</h4>
                <a href="#">Facebook</a>
                <a href="#">Instagram</a>
                <a href="#">YouTube</a>
            </div>
        </div>
        <div class="footer-bottom">
            <img src="assets/logo.png" alt="Logo" class="footer-logo">
            <p>© 2026 Ferretería Central — Todos los derechos reservados</p>
        </div>
    </footer>

    <script src="js/datos/db.js"></script>
    <script src="js/datos/productos.js"></script>
    <script src="js/datos/auth.js"></script>
    <script src="js/datos/carrito.js"></script>
    <script src="js/datos/pedidos.js"></script>
    <script src="js/store.js"></script>
    <script src="js/components/header.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Actualizar header según sesión
        (function() {
            const session = Store.getSession();
            const accountLink = document.getElementById('headerAccount');
            if (session && accountLink) {
                accountLink.innerHTML = '<small>Hola, ' + session.nombre.split(' ')[0] + '</small><strong>Mi Cuenta <i data-lucide="chevron-down"></i></strong>';
                accountLink.href = 'views/perfil.html';
                lucide.createIcons();
            }

            // Actualizar contador del carrito
            const cartCount = document.querySelector('.cart-count');
            if (cartCount) {
                cartCount.textContent = Store.getCartCount();
            }
        })();
    </script>

</body>

</html>
