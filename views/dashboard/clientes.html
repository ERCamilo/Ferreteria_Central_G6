<!-- Vista: Clientes -->
<!-- Este archivo es cargado dinámicamente por dashboard.js -->

<section class="dash-section">
    <div class="section-header">
        <div></div>
        <div class="section-actions">
            <button class="btn-outline btn-sm">
                <i data-lucide="download"></i>
                Exportar
            </button>
        </div>
    </div>
</section>

<!-- MINI STATS -->
<section class="mini-stats">
    <div class="mini-stat">
        <div class="mini-stat__icon mini-stat__icon--completed">
            <i data-lucide="users"></i>
        </div>
        <div>
            <p class="mini-stat__value" id="clientesTotal">0</p>
            <span class="mini-stat__label">Total Clientes</span>
        </div>
    </div>
    <div class="mini-stat">
        <div class="mini-stat__icon mini-stat__icon--processing">
            <i data-lucide="user-plus"></i>
        </div>
        <div>
            <p class="mini-stat__value" id="clientesNuevos">0</p>
            <span class="mini-stat__label">Nuevos este mes</span>
        </div>
    </div>
    <div class="mini-stat">
        <div class="mini-stat__icon mini-stat__icon--pending">
            <i data-lucide="repeat"></i>
        </div>
        <div>
            <p class="mini-stat__value" id="clientesRecurrentes">0%</p>
            <span class="mini-stat__label">Recurrentes</span>
        </div>
    </div>
</section>

<!-- FILTERS -->
<section class="filters-bar">
    <div class="filter-search">
        <i data-lucide="search"></i>
        <input type="text" placeholder="Buscar cliente..." id="searchClientes">
    </div>
    <select class="filter-select" id="filterClienteEstado">
        <option value="">Todos</option>
        <option value="activo">Activos</option>
        <option value="inactivo">Inactivos</option>
    </select>
</section>

<!-- CLIENTS TABLE -->
<section class="dash-panel">
    <div class="table-wrapper">
        <table class="dash-table">
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Email</th>
                    <th>Teléfono</th>
                    <th>Pedidos</th>
                    <th>Total Gastado</th>
                    <th>Registro</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="adminClientesTableBody">
                <!-- Se inyecta con dashboard.js -->
            </tbody>
        </table>
    </div>

    <div class="table-pagination">
        <span class="pagination-info">Mostrando 1-5 de 842 clientes</span>
        <div class="pagination-controls">
            <button class="pagination-btn" disabled>&laquo;</button>
            <button class="pagination-btn active">1</button>
            <button class="pagination-btn">2</button>
            <button class="pagination-btn">3</button>
            <span class="pagination-dots">...</span>
            <button class="pagination-btn">169</button>
            <button class="pagination-btn">&raquo;</button>
        </div>
    </div>
</section>
