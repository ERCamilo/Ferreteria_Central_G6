<!-- Vista: Ventas -->
<!-- Este archivo es cargado dinámicamente por dashboard.js -->

<section class="dash-section">
    <div class="section-header">
        <div></div>
        <div class="section-actions">
            <button class="btn-outline btn-sm">
                <i data-lucide="download"></i>
                Exportar CSV
            </button>
            <button class="btn-outline btn-sm">
                <i data-lucide="printer"></i>
                Imprimir
            </button>
        </div>
    </div>
</section>

<!-- SALES SUMMARY CARDS -->
<section class="stat-cards stat-cards--compact">
    <article class="stat-card stat-card--sales">
        <div class="stat-card__header">
            <span class="stat-card__label">VENTAS HOY</span>
            <i data-lucide="calendar"></i>
        </div>
        <p class="stat-card__value" id="ventasHoy">$0.00</p>
        <span class="stat-card__change positive">Calculado hoy</span>
    </article>

    <article class="stat-card stat-card--orders">
        <div class="stat-card__header">
            <span class="stat-card__label">ESTA SEMANA</span>
            <i data-lucide="calendar-range"></i>
        </div>
        <p class="stat-card__value" id="ventasSemana">$0.00</p>
        <span class="stat-card__change positive">Acumulado semanal</span>
    </article>

    <article class="stat-card stat-card--customers">
        <div class="stat-card__header">
            <span class="stat-card__label">ESTE MES</span>
            <i data-lucide="calendar-days"></i>
        </div>
        <p class="stat-card__value" id="ventasMes">$0.00</p>
        <span class="stat-card__change positive">Acumulado mensual</span>
    </article>
</section>

<!-- CHART PLACEHOLDER -->
<section class="dash-panel">
    <div class="panel-header">
        <h3>Tendencia de Ventas</h3>
        <div class="panel-filters">
            <button class="panel-btn" id="btnTendencia7">7 Días</button>
            <button class="panel-btn active" id="btnTendencia30">30 Días</button>
            <button class="panel-btn" id="btnTendencia90">90 Días</button>
        </div>
    </div>
    <div class="chart-container" style="position: relative; height:300px; width:100%">
        <canvas id="tendenciaVentasChart"></canvas>
    </div>
</section>

<!-- FILTERS -->
<section class="filters-bar">
    <div class="filter-search">
        <i data-lucide="search"></i>
        <input type="text" placeholder="Buscar venta..." id="searchVentas">
    </div>
    <input type="date" class="filter-date" id="filterFechaDesde">
    <input type="date" class="filter-date" id="filterFechaHasta">
</section>

<!-- SALES TABLE -->
<section class="dash-panel">
    <div class="table-wrapper">
        <table class="dash-table">
            <thead>
                <tr>
                    <th># Venta</th>
                    <th>Cliente</th>
                    <th>Productos</th>
                    <th>Fecha</th>
                    <th>Método Pago</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="adminVentasTableBody">
                <!-- Se inyectan con dashboard.js -->
            </tbody>
        </table>
    </div>

    <div class="table-pagination">
        <span class="pagination-info">Mostrando 1-5 de 4,521 ventas</span>
        <div class="pagination-controls">
            <button class="pagination-btn" disabled>&laquo;</button>
            <button class="pagination-btn active">1</button>
            <button class="pagination-btn">2</button>
            <button class="pagination-btn">3</button>
            <span class="pagination-dots">...</span>
            <button class="pagination-btn">905</button>
            <button class="pagination-btn">&raquo;</button>
        </div>
    </div>
</section>
