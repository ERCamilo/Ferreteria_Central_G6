<!-- Vista: Inventario -->
<!-- Este archivo es cargado dinámicamente por dashboard.js -->

<section class="dash-section">
    <div class="section-header">
        <div></div>
        <a href="#registrar-productos" class="btn-primary btn-sm">
            <i data-lucide="plus"></i>
            Nuevo Producto
        </a>
    </div>
</section>

<!-- FILTERS -->
<section class="filters-bar">
    <div class="filter-search">
        <i data-lucide="search"></i>
        <input type="text" placeholder="Buscar producto..." id="searchInventario">
    </div>
    <select class="filter-select" id="filterCategoria">
        <option value="">Todas las categorías</option>
        <option value="herramientas">Herramientas</option>
        <option value="materiales">Materiales</option>
        <option value="equipos">Equipos</option>
        <option value="electricidad">Electricidad</option>
        <option value="plomeria">Plomería</option>
        <option value="seguridad">Seguridad</option>
    </select>
    <select class="filter-select" id="filterStock">
        <option value="">Todo el stock</option>
        <option value="disponible">Disponible</option>
        <option value="bajo">Stock bajo</option>
        <option value="agotado">Agotado</option>
    </select>
</section>

<!-- INVENTORY TABLE -->
<section class="dash-panel">
    <div class="table-wrapper">
        <table class="dash-table">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th>Marca</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="inventoryTableBody">
                <!-- Productos inyectados por dashboard.js -->
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="table-pagination">
        <span class="pagination-info">Mostrando 1-6 de 1,258 productos</span>
        <div class="pagination-controls">
            <button class="pagination-btn" disabled>&laquo;</button>
            <button class="pagination-btn active">1</button>
            <button class="pagination-btn">2</button>
            <button class="pagination-btn">3</button>
            <span class="pagination-dots">...</span>
            <button class="pagination-btn">210</button>
            <button class="pagination-btn">&raquo;</button>
        </div>
    </div>
</section>
