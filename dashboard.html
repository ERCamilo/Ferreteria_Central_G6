<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Ferretería Central</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="dashboard-body">

    <div class="layout">

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <img src="assets/logo.png" class="sidebar-logo" alt="Logo">
                <span>FERRETERÍA CENTRAL</span>
            </div>

            <nav class="sidebar-nav" id="sidebarNav">
                <a href="#inicio" data-view="inicio" class="active">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#inventario" data-view="inventario">
                    <i data-lucide="package"></i>
                    <span>Inventario</span>
                </a>
                <a href="#pedidos" data-view="pedidos">
                    <i data-lucide="shopping-cart"></i>
                    <span>Pedidos</span>
                </a>
                <a href="#ventas" data-view="ventas">
                    <i data-lucide="trending-up"></i>
                    <span>Ventas</span>
                </a>
                <a href="#clientes" data-view="clientes">
                    <i data-lucide="users"></i>
                    <span>Clientes</span>
                </a>
                <a href="#registrar-productos" data-view="registrar-productos">
                    <i data-lucide="plus-circle"></i>
                    <span>Registrar Productos</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="sidebar-logout" onclick="logoutAdmin(event)">
                    <i data-lucide="log-out"></i>
                    <span>Cerrar Sesión</span>
                </a>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="dash-main">

            <!-- TOP BAR -->
            <header class="dash-topbar">
                <button class="sidebar-toggle" id="sidebarToggle" title="Menú">
                    <i data-lucide="menu"></i>
                </button>
                <div class="topbar-info">
                    <h1 class="topbar-title" id="viewTitle">Dashboard</h1>
                    <div class="topbar-datetime" id="topbarDatetime">
                        <i data-lucide="calendar"></i>
                        <span id="currentDate"></span>
                        <span class="datetime-separator">|</span>
                        <i data-lucide="clock"></i>
                        <span id="currentTime"></span>
                    </div>
                </div>
                <div class="dash-topbar-actions">
                    <button class="topbar-btn" title="Configuración">
                        <i data-lucide="settings"></i>
                    </button>
                    <button class="topbar-btn notification-btn" title="Notificaciones">
                        <i data-lucide="bell"></i>
                        <span class="notification-badge" id="notificationBadge">0</span>
                    </button>
                    <div class="topbar-user">
                        <div class="user-avatar" id="topbarUserAvatar">A</div>
                        <span class="user-name" id="topbarUserName">Admin</span>
                    </div>
                </div>
            </header>

            <!-- DYNAMIC CONTENT AREA -->
            <div id="content" class="dash-content">
                <!-- Loading spinner (shows while fetching views) -->
                <div class="loading-spinner" id="loadingSpinner">
                    <div class="spinner"></div>
                    <p>Cargando...</p>
                </div>
            </div>

        </main>
    </div>

    <script src="js/datos/db.js"></script>
    <script src="js/datos/productos.js"></script>
    <script src="js/datos/auth.js"></script>
    <script src="js/datos/carrito.js"></script>
    <script src="js/datos/pedidos.js"></script>
    <script src="js/store.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        function logoutAdmin(e) {
            e.preventDefault();
            if (confirm("¿Estás seguro de que deseas cerrar sesión?")) {
                Store.logout();
                window.location.href = 'index.html';
            }
        }
    </script>
</body>

</html>
